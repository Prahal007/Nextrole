# Railway Nixpacks Configuration for Full-Stack Deployment

[phases.setup]
nixPkgs = ["...", "postgresql", "openjdk", "nodejs"]

[phases.build]
nixPkgs = ["...", "postgresql", "openjdk", "nodejs"]
cmds = [
  "echo 'Building backend...' && cd backend && mvn clean package -DskipTests",
  "echo 'Building frontend...' && cd frontend && npm install && npm run build"
]

[start]
cmd = "docker compose up --build"

[variables]
NODE_ENV = "production"
SPRING_PROFILES_ACTIVE = "production"
