version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdfzen
      POSTGRES_USER: pdfzen
      POSTGRES_PASSWORD: pdfzen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfzen -d pdfzen"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/pdfzen
      DATABASE_USERNAME: pdfzen
      DATABASE_PASSWORD: pdfzen
      SERVER_PORT: 8080
      APP_UPLOAD_DIR: /app/uploads
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${AI_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:8080
    environment:
      API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
