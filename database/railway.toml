# PostgreSQL Database Service

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "docker run --name postgres -e POSTGRES_DB=pdfzen -e POSTGRES_USER=pdfzen -e POSTGRES_PASSWORD=pdfzen123 -p 5432:5432 postgres:15"

[variables]
POSTGRES_DB = "pdfzen"
POSTGRES_USER = "pdfzen"
POSTGRES_PASSWORD = "pdfzen123"
POSTGRES_HOST = "localhost"
POSTGRES_PORT = "5432"

# Railway will automatically provide these:
# PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE
