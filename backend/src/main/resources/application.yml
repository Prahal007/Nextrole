spring:
  application:
    name: pdfzen-resume-optimizer

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ""

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# App config
app:
  upload-dir: ${UPLOAD_DIR:./uploads}
  ai:
    provider: ${AI_PROVIDER:openai}
    api-key: ${APP_AI_API_KEY:${OPENAI_API_KEY:}}
    model: ${AI_MODEL:gpt-4o-mini}
