[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
SPRING_PROFILES_ACTIVE = "production"
SERVER_PORT = "8080"

# These variables are already configured in Railway:
# DATABASE_URL = "your_configured_value"
# DATABASE_USERNAME = "your_configured_value" 
# DATABASE_PASSWORD = "your_configured_value"
# APP_AI_API_KEY = "your_configured_value"
# OPENAI_API_KEY = "your_configured_value"
